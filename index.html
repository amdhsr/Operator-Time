<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گرافیک خطی سیر راهبران</title>
    <style>
        :root {
            --bg: #0c0d14;
            --card: #161722;
            --green: #00e676;
            --blue: #29b6f6;
            --amber: #ffa726;
            --text: #ffffff;
            --purple: #b388ff;
            --red: #ff5252;
        }
        body {
            font-family: Tahoma, Geneva, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page { display: none; width: 100%; max-width: 480px; }
        .active { display: block; }
        h2 { text-align: center; font-size: 18px; color: var(--green); margin-bottom: 15px; margin-top: 10px; }
        
        .section-box {
            background-color: var(--card);
            border: 1px solid #232433;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 15px;
            box-sizing: border-box;
            width: 100%;
        }
        h3 { font-size: 13px; color: #8f92a1; margin-top: 0; margin-bottom: 12px; border-bottom: 1px solid #232433; padding-bottom: 6px;}

        textarea {
            width: 100%; height: 75px; background-color: #0c0d14;
            color: var(--text); border: 1px solid #2d3045; border-radius: 8px;
            padding: 10px; box-sizing: border-box; font-size: 13px; resize: none;
            outline: none; margin-bottom: 8px;
        }
        textarea:focus { border-color: var(--green); }
        
        .manual-row {
            display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-end;
        }
        .manual-field {
            display: flex; flex-direction: column; flex: 1;
        }
        .manual-field label { font-size: 11px; color: #8f92a1; margin-bottom: 4px; }
        
        select, input[type="time"] {
            background-color: #0c0d14; color: var(--text); border: 1px solid #2d3045;
            padding: 8px; border-radius: 8px; font-size: 13px; outline: none; box-sizing: border-box; width: 100%;
            font-family: inherit; height: 38px;
        }

        button {
            background: linear-gradient(135deg, #00c853, #00e676); color: black; border: none;
            padding: 12px; width: 100%; border-radius: 12px; font-size: 14px;
            font-weight: bold; cursor: pointer; margin-top: 5px;
        }
        .btn-blue { background: linear-gradient(135deg, #0288d1, #29b6f6); color: white; }
        .btn-red { background: linear-gradient(135deg, #d32f2f, #ff5252); color: white; margin-top: 10px; }
        
        .trip-card {
            background-color: var(--card); border-right: 5px solid #333;
            padding: 14px; margin: 12px 0; border-radius: 8px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            position: relative; transition: all 0.3s;
        }
        .trip-card.S { border-right-color: var(--blue); }
        .trip-card.E { border-right-color: var(--amber); }
        .trip-card.F { border-right-color: var(--purple); }
        
        @keyframes current-trip-glow {
            0%, 100% { border-color: #00c853; box-shadow: 0 0 8px rgba(0,230,118,0.2); }
            50% { border-color: #ffffff; box-shadow: 0 0 18px rgba(0,230,118,0.5); }
        }
        .current-active-trip {
            border: 1px solid var(--green) !important;
            background-color: #1a231f !important;
            animation: current-trip-glow 2s infinite;
        }
        
        .live-tag {
            color: black; font-size: 11px; font-weight: bold; padding: 4px 8px;
            border-radius: 6px; margin-top: 6px; display: inline-block;
        }
        .live-tag.work { background-color: var(--blue); color: white; }
        .live-tag.countdown-p { background-color: var(--amber); color: black; }
        .live-tag.countdown-d { background-color: var(--red); color: white; }
        .live-tag.moving { background-color: var(--green); color: black; }
        .live-tag.airport { background-color: var(--purple); color: black; }
        
        .delete-btn {
            background: #25161d; color: #ff5252; border: 1px solid #421c25;
            padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 14px;
            margin-right: 10px; z-index: 20;
        }

        .route-info {
            width: 100%; background: var(--card); padding: 12px;
            border-radius: 10px; text-align: center; margin-bottom: 20px; font-weight: bold;
        }

        .rail-window {
            width: 100%; overflow-x: auto; padding: 60px 0; background: #090a0f;
            border-radius: 12px; border: 1px solid #1a1b26;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8); -webkit-overflow-scrolling: touch;
        }
        .rail-track {
            position: relative; display: flex; padding-left: 60px; padding-right: 60px;
            min-width: 2600px; height: 6px; background-color: #252736; align-items: center;
        }
        .rail-track.airport-extended {
            min-width: 3600px !important;
            background-color: #140e24;
        }
        
        .rail-station { position: absolute; display: flex; flex-direction: column; align-items: center; width: 140px; transform: translateX(-50%); }
        .station-dot { width: 14px; height: 14px; border-radius: 50%; background-color: #454960; border: 3px solid var(--bg); z-index: 5; transition: all 0.3s; }
        .station-dot.S { background-color: var(--blue); }
        .station-dot.E { background-color: var(--amber); }
        .station-dot.F { background-color: var(--purple); }
        .station-dot.terminal { background-color: var(--green); width: 16px; height: 16px; }

        .st-name { position: absolute; bottom: 24px; font-size: 13px; color: #8f92a1; white-space: nowrap; font-weight: bold; transition: color 0.3s; }
        .st-times { position: absolute; top: 24px; font-size: 11px; color: #555973; white-space: nowrap; direction: ltr; }
        .countdown-badge { background-color: #000000; color: var(--green); font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid #1b5e20; margin-top: 38px; white-space: nowrap; font-weight: bold; display: none; }

        .train-pointer {
            position: absolute; width: 24px; height: 24px; background-color: var(--green); border-radius: 6px; z-index: 10; transform: translate(-50%, -50%); 
            box-shadow: 0 0 20px var(--green), 0 0 6px #fff; display: none; transition: left 0.4s linear; text-align: center; line-height: 24px;
        }
        .train-pointer::after { content: '🚄'; font-size: 14px; }

        @keyframes line-blink {
            0%, 100% { background-color: var(--green); box-shadow: 0 0 15px var(--green); transform: scale(1.3); }
            50% { background-color: #fff; box-shadow: 0 0 4px #fff; transform: scale(1.0); }
        }
        .active-dot { animation: line-blink 1s infinite !important; }
        .active-text { color: var(--green) !important; font-size: 15px !important; text-shadow: 0 0 8px rgba(0,230,118,0.3); }
    </style>
</head>
<body>

    <div id="homePage" class="page active">
        <h2>📋 سیستم تنظیم هوشمند شیفت راهبران</h2>
        
        <div class="section-box">
            <h3>⚠️ ورود دستی برنامه (مواقع اضطراری)</h3>
            <div class="manual-row">
                <div class="manual-field" style="flex: 1.2;">
                    <label>محل اعزام (مبدأ)</label>
                    <select id="manualOrigin">
                        <option value="S">غدیر (مسیر رفت خط اصلی)</option>
                        <option value="E">وکیل‌آباد (مسیر برگشت خط اصلی)</option>
                        <option value="F">انشعاب فرودگاه (لوپ رفت و برگشت زنجیره‌ای)</option>
                    </select>
                </div>
                <div class="manual-field">
                    <label>ساعت سکو</label>
                    <input type="time" id="manualPlatform" required>
                </div>
                <div class="manual-field">
                    <label>ساعت اعزام</label>
                    <input type="time" id="manualDispatch" required>
                </div>
            </div>
            <button class="btn-blue" onclick="addManualTrip()">➕ ثبت و پردازش دستی قطار</button>
        </div>

        <div class="section-box">
            <h3>📥 استخراج از روی متن پیامک‌ها</h3>
            <label style="font-size: 11px; color: #8f92a1; display:block; margin-bottom:4px;">۱. متن پیامک خط اصلی (وکیل‌آباد/غدیر)</label>
            <textarea id="mainSmsInput" placeholder="پیامک خط اصلی را اینجا پیست کنید..."></textarea>
            
            <label style="font-size: 11px; color: #8f92a1; display:block; margin-bottom:4px; margin-top:6px;">۲. متن پیامک انشعاب فرودگاه (در صورت وجود)</label>
            <textarea id="airportSmsInput" placeholder="اگر پیامک انشعاب فرودگاه دارید، اینجا پیست کنید (اختیاری)..."></textarea>
            
            <button class="btn-blue" onclick="parseSms()">📊 استخراج گراف ریلی یکپارچه</button>
            <button class="btn-red" onclick="clearAllData()">🗑️ حذف و پاکسازی کل اطلاعات</button>
        </div>

        <div id="tripsList" style="margin-top: 5px;"></div>
    </div>

    <div id="graphPage" class="page" style="max-width: 100%;">
        <button onclick="showHome()" style="background: #262837; color: white; width: auto; padding: 10px 20px; margin-bottom: 15px;">🔙 بازگشت به لیست</button>
        <div id="routeHeader" class="route-info"></div>
        
        <div class="rail-window" id="railWindow" onscroll="logUserInteraction()" ontouchstart="logUserInteraction()" ontouchmove="logUserInteraction()">
            <div class="rail-track" id="railTrack">
                <div class="train-pointer" id="trainPointer"></div>
                <div id="stationsLayer"></div>
            </div>
        </div>
    </div>

    <script>
        const ghadirToVakil = [
            {"name": "غدیر", "sec": 0}, {"name": "پروین اعتصامی", "sec": 152}, {"name": "۱۷ شهریور", "sec": 238},
            {"name": "بسیج", "sec": 350}, {"name": "امام خمینی", "sec": 457}, {"name": "شریعتی", "sec": 614},
            {"name": "قائم", "sec": 716}, {"name": "طالقانی", "sec": 804}, {"name": "فلسطین", "sec": 916},
            {"name": "خیام", "sec": 1038}, {"name": "آزادی", "sec": 1138}, {"name": "پارک ملت", "sec": 1270},
            {"name": "کوثر", "sec": 1361}, {"name": "سید رضی", "sec": 1456}, {"name": "دانش‌آموز", "sec": 1546},
            {"name": "هفت تیر", "sec": 1639}, {"name": "صدف", "sec": 1729}, {"name": "صیاد شیرازی", "sec": 1822},
            {"name": "اقبال لاهوری", "sec": 1920}, {"name": "نمایشگاه", "sec": 2025}, {"name": "کوهستان پارک", "sec": 2120},
            {"name": "وکیل‌آباد (مقصد)", "sec": 2535}
        ];

        const vakilToGhadir = [
            {"name": "وکیل‌آباد (مبدأ)", "sec": 0}, {"name": "کوهستان پارک", "sec": 240}, {"name": "نمایشگاه", "sec": 340},
            {"name": "اقبال لاهوری", "sec": 441}, {"name": "صیاد شیرازی", "sec": 526}, {"name": "صدف", "sec": 626},
            {"name": "هفت تیر", "sec": 716}, {"name": "دانش‌آموز", "sec": 810}, {"name": "سید رضی", "sec": 910},
            {"name": "کوثر", "sec": 1027}, {"name": "پارک ملت", "sec": 1145}, {"name": "آزادی", "sec": 1246},
            {"name": "خیام", "sec": 1373}, {"name": "فلسطین", "sec": 1490}, {"name": "طالقانی", "sec": 1589},
            {"name": "قائم", "sec": 1708}, {"name": "شریعتی", "sec": 1835}, {"name": "امام خمینی", "sec": 1950},
            {"name": "بسیج", "sec": 2042}, {"name": "۱۷ شهریور", "sec": 2122}, {"name": "پروین اعتصامی", "sec": 2297},
            {"name": "غدیر (مقصد)", "sec": 2392}
        ];

        let parsedTrips = [];
        let currentActiveInterval = null;
        let homePageInterval = null; 
        let lastInteractionTime = 0; 

        function logUserInteraction() { lastInteractionTime = Date.now(); }

        function getSecondsOfDay(timeStr, offsetSeconds = 0) {
            let parts = timeStr.split(':');
            return (parseInt(parts[0]) * 3600) + (parseInt(parts[1]) * 60) + offsetSeconds;
        }

        function formatSecondsToTime(totalSeconds) {
            let h = Math.floor(totalSeconds / 3600) % 24;
            let m = Math.floor((totalSeconds % 3600) / 60);
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        }

        function clearAllData() {
            if (confirm("آیا از حذف کل لیست اعزام‌ها و خالی کردن کادرهای پیامک اطمینان دارید؟")) {
                document.getElementById('mainSmsInput').value = "";
                document.getElementById('airportSmsInput').value = "";
                parsedTrips = [];
                if(homePageInterval) clearInterval(homePageInterval);
                document.getElementById('tripsList').innerHTML = "";
            }
        }

        function addManualTrip() {
            let type = document.getElementById('manualOrigin').value;
            let platformTime = document.getElementById('manualPlatform').value;
            let dispatchTime = document.getElementById('manualDispatch').value;

            if (!platformTime || !dispatchTime) {
                alert("لطفاً ساعات را درست وارد کنید.");
                return;
            }

            let platformSec = getSecondsOfDay(platformTime);
            let dispatchSec = getSecondsOfDay(dispatchTime);
            let workSec = (type === "E") ? (dispatchSec - (20 * 60)) : (platformSec - (30 * 60));

            let label = type === "S" ? "غدیر" : (type === "E" ? "وکیل‌آباد" : "لوپ کامل فرودگاه");
            let raw = `اعزام دستی قطار | مبدأ: ${label} | سکو ${platformTime} | اعزام ${dispatchTime}`;

            let item = {
                type: type, platformTime: platformTime, dispatchTime: dispatchTime,
                raw: raw, workSec: workSec, platformSec: platformSec, dispatchSec: dispatchSec,
                isAirportChain: (type === "F")
            };

            if(type === "F") {
                item.airportGoPlatformStr = platformTime; 
                item.airportGoDispatchStr = formatSecondsToTime(platformSec + 180); 
                item.airportBackPlatformStr = formatSecondsToTime(platformSec + 780); 
                item.airportBackDispatchStr = formatSecondsToTime(platformSec + 1860); 
            }

            parsedTrips.push(item);
            parsedTrips.sort((a, b) => a.dispatchSec - b.dispatchSec);
            showHome();
        }

        function parseSms() {
            let mainText = document.getElementById('mainSmsInput').value;
            let airportText = document.getElementById('airportSmsInput').value;

            let mainLines = mainText.split('\n');
            let airportLines = airportText.split('\n');
            
            let filteredAirportLines = [];
            airportLines.forEach(l => {
                let clean = l.trim();
                // ⚡ حذف علامت ^ برای برداشتن حساسیت شروع خط
                if (/[SE]\)/i.test(clean)) filteredAirportLines.push(clean);
            });

            let tempTrips = [];

            mainLines.forEach((line) => {
                let clean = line.trim();
                let type = "";
                // ⚡ اصلاح رگولار اکسپرسیون برای پیدا کردن علامت مبدا در هر کجای خط
                if (/S\)/i.test(clean)) type = "S";
                else if (/E\)/i.test(clean)) type = "E";
                
                if(type) {
                    let times = clean.match(/(\d{1,2}):(\d{2})/g);
                    if(times && times.length >= 2) {
                        let pT = times[0], dT = times[1];  
                        let pS = getSecondsOfDay(pT), dS = getSecondsOfDay(dT);
                        let wS = (type === "E") ? (dS - (20 * 60)) : (pS - (30 * 60));
                        
                        tempTrips.push({ 
                            type: type, platformTime: pT, dispatchTime: dT, 
                            raw: clean, workSec: wS, platformSec: pS, dispatchSec: dS,
                            isAirportChain: false
                        });
                    }
                }
            });

            if (filteredAirportLines.length >= 2) {
                let firstLineTimes = filteredAirportLines[0].match(/(\d{1,2}):(\d{2})/g);
                let secondLineTimes = filteredAirportLines[1].match(/(\d{1,2}):(\d{2})/g);

                if (firstLineTimes && secondLineTimes) {
                    let goPlatformStr = firstLineTimes[0];   
                    let goDispatchStr = firstLineTimes[1];   
                    let backPlatformStr = secondLineTimes[0]; 
                    let backDispatchStr = secondLineTimes[1]; 

                    let matchTrip = tempTrips.find(t => t.type === "S" && t.platformTime === goPlatformStr);
                    if (matchTrip) {
                        matchTrip.isAirportChain = true;
                        matchTrip.type = "F"; 
                        matchTrip.airportGoPlatformStr = goPlatformStr;
                        matchTrip.airportGoDispatchStr = goDispatchStr;
                        matchTrip.airportBackPlatformStr = backPlatformStr;
                        matchTrip.airportBackDispatchStr = backDispatchStr;
                        
                        matchTrip.workSec = getSecondsOfDay(goPlatformStr) - (30 * 60);
                        matchTrip.raw = `✈️ لوپ زنجیره‌ای فرودگاه | رفت فرودگاه: ${goDispatchStr} | برگشت: ${backDispatchStr} | اعزام بزرگ غدیر: ${matchTrip.dispatchTime}`;
                    }
                }
            }

            parsedTrips = tempTrips;
            parsedTrips.sort((a, b) => a.dispatchSec - b.dispatchSec);
            showHome();
        }

        function deleteTrip(index, event) {
            event.stopPropagation(); 
            if (confirm("حذف این ردیف؟")) {
                parsedTrips.splice(index, 1);
                renderTripsListLive();
            }
        }

        function renderTripsListLive() {
            if (parsedTrips.length === 0) { document.getElementById('tripsList').innerHTML = ""; return; }
            let now = new Date();
            let currentSeconds = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();

            let bestIndex = -1;
            for(let i = 0; i < parsedTrips.length; i++) {
                let trip = parsedTrips[i];
                let totalMainLineSec = (trip.type === "E") ? 2392 : 2535;
                let tripEndSec = trip.dispatchSec + totalMainLineSec;
                
                if (currentSeconds <= tripEndSec) {
                    bestIndex = i;
                    break;
                }
            }

            let firstTrip = parsedTrips[0];
            if (firstTrip.type === "E") { firstTrip.workSec = firstTrip.dispatchSec - (20 * 60); } 
            else if (firstTrip.type === "F") { firstTrip.workSec = getSecondsOfDay(firstTrip.airportGoPlatformStr) - (30 * 60); } 
            else { firstTrip.workSec = firstTrip.platformSec - (30 * 60); }

            let listHtml = "";
            parsedTrips.forEach((trip, idx) => {
                let isCurrent = (idx === bestIndex);
                let isFirstTripOfAll = (idx === 0); 
                let currentClass = isCurrent ? "current-active-trip" : "";
                let liveTagHtml = "";
                
                let placeName = (trip.type === "E") ? "وکیل‌آباد" : "غدیر";
                let workTimeStr = formatSecondsToTime(trip.workSec);

                let totalMainLineSec = (trip.type === "E") ? 2392 : 2535;
                let isThisTripFinished = (currentSeconds > trip.dispatchSec + totalMainLineSec);

                if (isCurrent && !isThisTripFinished) {
                    let targetPlatformSec = trip.isAirportChain ? getSecondsOfDay(trip.airportGoPlatformStr) : trip.platformSec;
                    let targetDispatchSec = trip.isAirportChain ? getSecondsOfDay(trip.airportGoDispatchStr) : trip.dispatchSec;

                    if (isFirstTripOfAll && currentSeconds < trip.workSec) {
                        let remSeconds = trip.workSec - currentSeconds;
                        let remMin = Math.ceil(remSeconds / 60);
                        liveTagHtml = `<span class="live-tag work">⏱️ ساعت حضور در ${placeName}: ${workTimeStr} (${remMin} دقیقه مانده تا حضور)</span>`;
                    } 
                    else if (currentSeconds >= (isFirstTripOfAll ? trip.workSec : 0) && currentSeconds < targetPlatformSec) {
                        let remMin = Math.ceil((targetPlatformSec - currentSeconds) / 60);
                        liveTagHtml = `<span class="live-tag countdown-p">⏳ ${remMin} دقیقه مانده تا اولین سکو</span>`;
                    } 
                    else if (currentSeconds >= targetPlatformSec && currentSeconds < targetDispatchSec) {
                        let remMin = Math.ceil((targetDispatchSec - currentSeconds) / 60);
                        liveTagHtml = `<span class="live-tag countdown-d">🚨 ${remMin} دقیقه مانده تا اعزام</span>`;
                    } 
                    else if (trip.isAirportChain) {
                        let goDispatchSec = getSecondsOfDay(trip.airportGoDispatchStr);
                        let backPlatformSec = getSecondsOfDay(trip.airportBackPlatformStr);
                        let backDispatchSec = getSecondsOfDay(trip.airportBackDispatchStr);

                        if (currentSeconds >= goDispatchSec && currentSeconds < goDispatchSec + 540) {
                            liveTagHtml = `<span class="live-tag airport">🚄 در مسیر: غدیر 👈 فرودگاه</span>`;
                        } else if (currentSeconds >= goDispatchSec + 540 && currentSeconds < backPlatformSec) {
                            liveTagHtml = `<span class="live-tag airport">🔄 شانت در فرودگاه</span>`;
                        } else if (currentSeconds >= backPlatformSec && currentSeconds < backDispatchSec) {
                            let remMainDisp = Math.ceil((backDispatchSec - currentSeconds) / 60);
                            liveTagHtml = `<span class="live-tag countdown-d">🚨 ${remMainDisp} دقیقه تا اعزام برگشت فرودگاه</span>`;
                        } else if (currentSeconds >= backDispatchSec && currentSeconds < backDispatchSec + 540) {
                            liveTagHtml = `<span class="live-tag airport">🚄 در مسیر: فرودگاه 👈 غدیر شمالی</span>`;
                        } else if (currentSeconds >= backDispatchSec + 540 && currentSeconds < trip.dispatchSec) {
                            let remBigDisp = Math.ceil((trip.dispatchSec - currentSeconds) / 60);
                            liveTagHtml = `<span class="live-tag countdown-d">🚨 ${remBigDisp} دقیقه تا اعزام بزرگ به وکیل‌آباد</span>`;
                        } else {
                            liveTagHtml = `<span class="live-tag moving">🟢 خط اصلی: غدیر 👈 وکیل‌آباد...</span>`;
                        }
                    } else {
                        liveTagHtml = `<span class="live-tag moving">🟢 در حال سیر در خط اصلی...</span>`;
                    }
                } else {
                    if (isThisTripFinished) {
                        if (idx === parsedTrips.length - 1 && bestIndex === parsedTrips.length - 1) {
                            liveTagHtml = `<span class="live-tag work" style="background:#232433; color:#8f92a1;">✓ شیفت ممتد امروز با موفقیت پایان یافت</span>`;
                        } else {
                            liveTagHtml = `<span class="live-tag work" style="background:#1b1c26; color:#555973;">✓ سیر انجام شد</span>`;
                        }
                    } else if (isFirstTripOfAll && currentSeconds < trip.workSec) {
                        let remSeconds = trip.workSec - currentSeconds;
                        let remMin = Math.ceil(remSeconds / 60);
                        liveTagHtml = `<span class="live-tag work">⏱️ ساعت حضور در ${placeName}: ${workTimeStr} (${remMin} دقیقه مانده تا حضور)</span>`;
                    } else {
                        liveTagHtml = ``;
                    }
                }
                
                let arrowLabel = trip.type === "S" ? "🔵 رفت (غدیر 👈 وکیل‌آباد)" : (trip.type === "E" ? "🟡 برگشت (وکیل‌آباد 👈 غدیر)" : "🔮 زنجیره لوپ فرودگاه تا وکیل‌آباد");
                listHtml += `<div class="trip-card ${trip.type} ${currentClass}" onclick="openGraph(${idx})">
                    <div style="flex: 1; min-width: 0;">
                        <b>${trip.raw}</b><br>${liveTagHtml ? liveTagHtml + '<br>' : ''}
                        <span style="font-size:12px; color:#8f92a1; display:inline-block; margin-top:6px;">${arrowLabel}</span>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <button class="delete-btn" onclick="deleteTrip(${idx}, event)">🗑️</button>
                        <span style="color:var(--green); font-size:18px;">◀</span>
                    </div>
                </div>`;
            });
            document.getElementById('tripsList').innerHTML = listHtml;
        }

        function openGraph(index) {
            if(homePageInterval) clearInterval(homePageInterval);
            let trip = parsedTrips[index];
            let track = document.getElementById('railTrack');
            
            track.classList.remove('airport-extended');
            let totalTrackWidth = 2400; 

            let route = [];
            let isAirportMode = trip.isAirportChain;

            if (isAirportMode) {
                track.classList.add('airport-extended');
                totalTrackWidth = 3500; 

                route = [
                    {"name": "غدیر (شروع رفت فرودگاه)", "sec": 0, "isEx": true, "tMode": "GO_PLAT"},
                    {"name": "بوستان ریحان (رفت)", "sec": 343, "isEx": true, "tMode": "GO_REY"},
                    {"name": "فرودگاه (۳دقیقه شانت 🔄)", "sec": 540, "isEx": true, "tMode": "SHUNT"}, 
                    {"name": "فرودگاه (سکوی شمالی برگشت)", "sec": 1200, "isEx": true, "tMode": "BACK_START"},
                    {"name": "بوستان ریحان (برگشت)", "sec": 1200 + 188, "isEx": true, "tMode": "BACK_REY"},
                    {"name": "غدیر (وصول شمالی سکو)", "sec": 1200 + 540, "isEx": true, "tMode": "MAIN_ARRIVE"}, 
                    
                    {"name": "پروین اعتصامی", "sec": 2000, "isMainLine": true, "offset": 152}, 
                    {"name": "۱۷ شهریور", "sec": 2000, "isMainLine": true, "offset": 238},
                    {"name": "بسیج", "sec": 2000, "isMainLine": true, "offset": 350}, 
                    {"name": "امام خمینی", "sec": 2000, "isMainLine": true, "offset": 457}, 
                    {"name": "شریعتی", "sec": 2000, "isMainLine": true, "offset": 614},
                    {"name": "قائم", "sec": 2000, "isMainLine": true, "offset": 716}, 
                    {"name": "طالقانی", "sec": 2000, "isMainLine": true, "offset": 804}, 
                    {"name": "فلسطین", "sec": 2000, "isMainLine": true, "offset": 916},
                    {"name": "خیام", "sec": 2000, "isMainLine": true, "offset": 1038}, 
                    {"name": "آزادی", "sec": 2000, "isMainLine": true, "offset": 1138}, 
                    {"name": "پارک ملت", "sec": 2000, "isMainLine": true, "offset": 1270},
                    {"name": "کوثر", "sec": 2000, "isMainLine": true, "offset": 1361}, 
                    {"name": "سید رضی", "sec": 2000, "isMainLine": true, "offset": 1456}, 
                    {"name": "دانش‌آموز", "sec": 2000, "isMainLine": true, "offset": 1546},
                    {"name": "هفت تیر", "sec": 2000, "isMainLine": true, "offset": 1639}, 
                    {"name": "صدف", "sec": 2000, "isMainLine": true, "offset": 1729}, 
                    {"name": "صیاد شیرازی", "sec": 2000, "isMainLine": true, "offset": 1822},
                    {"name": "اقبال لاهوری", "sec": 2000, "isMainLine": true, "offset": 1920}, 
                    {"name": "نمایشگاه", "sec": 2000, "isMainLine": true, "offset": 2025}, 
                    {"name": "کوهستان پارک", "sec": 2000, "isMainLine": true, "offset": 2120},
                    {"name": "وکیل‌آباد (مقصد نهایی)", "sec": 2000, "isMainLine": true, "offset": 2535}
                ];
            } else {
                route = (trip.type === "S") ? ghadirToVakil : vakilToGhadir;
            }

            let totalVirtualSec = isAirportMode ? (2000 + 2535) : route[route.length - 1].sec;
            let headerText = isAirportMode ? `🔮 زنجیره هوشمند داینامیک: غدیر 👈 فرودگاه 👈 غدیر 👈 وکیل‌آباد` : ((trip.type === "E") ? `📉 برگشت: وکیل‌آباد 👈 غدیر (سیر ۴۰ دقیقه‌ای)` : `📈 رفت: غدیر 👈 وکیل‌آباد (سیر ۴۳ دقیقه‌ای)`);
            
            document.getElementById('routeHeader').innerText = headerText;
            document.getElementById('routeHeader').style.color = isAirportMode ? 'var(--purple)' : ((trip.type === "E") ? 'var(--amber)' : 'var(--blue)');

            let html = "";
            route.forEach((station, idx) => {
                let isTerminal = idx === 0 || idx === route.length - 1;
                let dispatchSec = 0;

                if (isAirportMode) {
                    if (station.isEx) {
                        if (station.tMode === "GO_PLAT") dispatchSec = getSecondsOfDay(trip.airportGoPlatformStr);
                        else if (station.tMode === "GO_REY") dispatchSec = getSecondsOfDay(trip.airportGoDispatchStr) + 343;
                        else if (station.tMode === "SHUNT") dispatchSec = getSecondsOfDay(trip.airportGoDispatchStr) + 540; 
                        else if (station.tMode === "BACK_START") dispatchSec = getSecondsOfDay(trip.airportBackDispatchStr); 
                        else if (station.tMode === "BACK_REY") dispatchSec = getSecondsOfDay(trip.airportBackDispatchStr) + 188;
                        else if (station.tMode === "MAIN_ARRIVE") dispatchSec = getSecondsOfDay(trip.airportBackDispatchStr) + 540; 
                    } else if (station.isMainLine) {
                        dispatchSec = getSecondsOfDay(trip.dispatchTime, station.offset);
                    }
                } else {
                    dispatchSec = getSecondsOfDay(trip.dispatchTime, station.sec);
                }

                let arrSec = isTerminal ? dispatchSec : dispatchSec - 30;
                
                if (station.tMode === "SHUNT") {
                    arrSec = getSecondsOfDay(trip.airportGoDispatchStr) + 540; 
                    dispatchSec = getSecondsOfDay(trip.airportBackPlatformStr); 
                }
                if (station.tMode === "MAIN_ARRIVE") {
                    arrSec = getSecondsOfDay(trip.airportBackDispatchStr) + 540; 
                    dispatchSec = getSecondsOfDay(trip.dispatchTime); 
                }

                let vSec = station.isMainLine ? (2000 + station.offset) : station.sec;
                let pct = vSec / totalVirtualSec;
                let isReverse = (trip.type === "S" || isAirportMode);
                let posX = isReverse ? (1 - pct) * totalTrackWidth : pct * totalTrackWidth;
                
                let timeLabel = "";
                if (station.tMode === "SHUNT") {
                    timeLabel = `وصول: ${formatSecondsToTime(arrSec)} | شانت 🔄`;
                } else if (station.tMode === "MAIN_ARRIVE") {
                    timeLabel = `ورود: ${formatSecondsToTime(arrSec)} | اعزام غدیر: ${formatSecondsToTime(dispatchSec)}`;
                } else {
                    timeLabel = isTerminal ? formatSecondsToTime(dispatchSec) : `${formatSecondsToTime(arrSec)} - ${formatSecondsToTime(dispatchSec)}`;
                }

                html += `<div class="rail-station" style="left: ${posX}px;" id="stBlock_${idx}" data-arrival="${arrSec}" data-dispatch="${dispatchSec}" data-posx="${posX}">
                    <div class="st-name" id="stName_${idx}">${station.name}</div>
                    <div class="station-dot ${isTerminal?'terminal':(station.isEx?'F':trip.type)}" id="stDot_${idx}"></div>
                    <div class="st-times">${timeLabel}</div>
                    <div class="countdown-badge" id="stCount_${idx}"></div>
                </div>`;
            });

            document.getElementById('stationsLayer').innerHTML = html;
            document.getElementById('graphPage').classList.add('active');
            document.getElementById('homePage').classList.remove('active');

            setTimeout(() => {
                let isReverse = (trip.type === "S" || isAirportMode);
                let initScrollX = isReverse ? totalTrackWidth + 60 : 0;
                document.getElementById('railWindow').scrollLeft = isReverse ? -initScrollX : initScrollX;
                lastInteractionTime = 0; 
            }, 100);

            if(currentActiveInterval) clearInterval(currentActiveInterval);
            checkAndMoveTrainLive(route.length, trip, totalVirtualSec, totalTrackWidth, isAirportMode);
            currentActiveInterval = setInterval(() => { checkAndMoveTrainLive(route.length, trip, totalVirtualSec, totalTrackWidth, isAirportMode); }, 1000);
        }

        function checkAndMoveTrainLive(totalStations, trip, totalVirtualSec, totalTrackWidth, isAirportMode) {
            let now = new Date();
            let currentSecondsOfDay = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
            let pointer = document.getElementById('trainPointer');
            let trainPlaced = false;
            let targetBlockToScroll = null;

            for (let i = 0; i < totalStations; i++) {
                let block = document.getElementById(`stBlock_${i}`);
                let dot = document.getElementById(`stDot_${i}`);
                let name = document.getElementById(`stName_${i}`);
                let countBox = document.getElementById(`stCount_${i}`);
                if (!block) continue;

                let arrSec = parseInt(block.getAttribute('data-arrival'));
                let dispSec = parseInt(block.getAttribute('data-dispatch'));
                let posX = parseFloat(block.getAttribute('data-posx'));

                dot.classList.remove('active-dot');
                name.classList.remove('active-text');
                countBox.style.display = "none";

                if (currentSecondsOfDay >= arrSec && currentSecondsOfDay <= dispSec) {
                    dot.classList.add('active-dot');
                    name.classList.add('active-text');
                    let remainingSeconds = dispSec - currentSecondsOfDay;
                    if (remainingSeconds >= 0) {
                        countBox.innerText = `حرکت تا ${remainingSeconds} ثانیه`;
                        countBox.style.display = "block";
                    }
                    pointer.style.left = posX + "px";
                    pointer.style.display = "block";
                    trainPlaced = true;
                    targetBlockToScroll = block; 
                }
            }

            if (!trainPlaced) {
                let mainLineStartSec = getSecondsOfDay(trip.dispatchTime);
                if (isAirportMode && currentSecondsOfDay < mainLineStartSec) {
                    let baseStart = getSecondsOfDay(trip.airportGoPlatformStr);
                    let elapsed = currentSecondsOfDay - baseStart;
                    let pct = Math.min(elapsed / 2000, 1);
                    pointer.style.left = ((1 - (pct * 2000 / totalVirtualSec)) * totalTrackWidth) + "px";
                    pointer.style.display = "block";
                    trainPlaced = true;
                } else {
                    let tripStartSec = getSecondsOfDay(trip.dispatchTime);
                    let totalMainLineSec = (trip.type === "E") ? 2392 : 2535; 
                    
                    if (currentSecondsOfDay >= tripStartSec && currentSecondsOfDay <= tripStartSec + totalMainLineSec) {
                        let secondsPassed = currentSecondsOfDay - tripStartSec;
                        let mainPct = secondsPassed / totalMainLineSec;
                        
                        let virtualSecNow = isAirportMode ? (2000 + (mainPct * 2535)) : (mainPct * totalMainLineSec);
                        let finalPct = virtualSecNow / totalVirtualSec;
                        
                        let isReverse = (trip.type === "S" || isAirportMode);
                        pointer.style.left = (isReverse ? (1 - finalPct) * totalTrackWidth : finalPct * totalTrackWidth) + "px";
                        pointer.style.display = "block";
                        trainPlaced = true;
                    } else if (!trainPlaced) {
                        pointer.style.display = "none";
                    }
                }
            }

            if (trainPlaced && (Date.now() - lastInteractionTime > 3000)) {
                if (targetBlockToScroll) {
                    targetBlockToScroll.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else {
                    pointer.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            }
        }

        function showHome() {
            if(currentActiveInterval) clearInterval(currentActiveInterval);
            document.getElementById('graphPage').classList.remove('active');
            document.getElementById('homePage').classList.add('active');
            if(homePageInterval) clearInterval(homePageInterval);
            renderTripsListLive();
            homePageInterval = setInterval(renderTripsListLive, 1000);
        }
    </script>
